codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        # Configs packages have smoke tests, not unit tests — track trend rather
        # than enforcing a hard threshold.
        target: auto
        threshold: 5%
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: browserslist-config
      name: "browserslist-config"
      paths:
        - packages/browserslist-config/**

    - component_id: commitlint-config
      name: "commitlint-config"
      paths:
        - packages/commitlint-config/**

    - component_id: eslint-config
      name: "eslint-config"
      paths:
        - packages/eslint-config/**

    - component_id: lint-staged-config
      name: "lint-staged-config"
      paths:
        - packages/lint-staged-config/**

    - component_id: prettier-config
      name: "prettier-config"
      paths:
        - packages/prettier-config/**

    - component_id: semantic-release-config
      name: "semantic-release-config"
      paths:
        - packages/semantic-release-config/**

    - component_id: storybook-config
      name: "storybook-config"
      paths:
        - packages/storybook-config/**

    - component_id: stylelint-config
      name: "stylelint-config"
      paths:
        - packages/stylelint-config/**

    - component_id: tsconfig
      name: "tsconfig"
      paths:
        - packages/tsconfig/**

    - component_id: tsdown-config
      name: "tsdown-config"
      paths:
        - packages/tsdown-config/**

    - component_id: vite-config
      name: "vite-config"
      paths:
        - packages/vite-config/**

    - component_id: vitest-config
      name: "vitest-config"
      paths:
        - packages/vitest-config/**
